[pytest]

# Tell pytest where Django's settings module lives
DJANGO_SETTINGS_MODULE = backend.settings

# Add backend/ to Python path so imports like "from game_analyzer..." work
pythonpath = .

# Where to find test files (only looks in this directory)
testpaths = game_analyzer/tests

# Flags applied to every pytest run:
#   --verbose: show each test name instead of just dots
#   --cov=game_analyzer: measure code coverage for the app
#   --cov-report=term-missing: show which lines are not yet tested
addopts = --verbose --cov=game_analyzer --cov-report=term-missing

# python-chess uses asyncio.DefaultEventLoopPolicy which is deprecated
# in Python 3.14 and slated for removal in 3.16. This is their code,
# not ours — suppress it so it doesn't clutter test output.
# Only affects DeprecationWarning from chess.engine, nothing else.
filterwarnings =
    ignore::DeprecationWarning:chess.engine
